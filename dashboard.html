<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinery Shutdown Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h2>Refinery Shutdown Dashboard</h2>
  <div>
    <span id="userEmail"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- DASHBOARD STATUS CARDS -->
<div class="dashboard-grid">

  <div class="card">
    <h3>Maintenance Started</h3>
    <p id="maintenanceCount">0</p>
  </div>

  <div class="card">
    <h3>Pre-Cleaning Inspection Pending</h3>
    <p id="preCleanCount">0</p>
  </div>

  <div class="card">
    <h3>Post-Cleaning Inspection Pending</h3>
    <p id="postCleanCount">0</p>
  </div>

  <div class="card">
    <h3>Ready for Box-Up</h3>
    <p id="boxupCount">0</p>
  </div>

</div>

<!-- WORKFLOW UPDATE SECTION -->
<div class="card" style="margin:20px;">
  <h3>Update Equipment Workflow</h3>

  <!-- ✅ Equipment Dropdown (No Free Typing) -->
  <label><b>Select Equipment</b></label>
  <select id="equipmentSelect" style="width:100%;padding:8px;margin-bottom:5px;">
    <option value="">Loading equipment...</option>
  </select>

  <!-- ✅ Current Status Display -->
  <p id="currentStatusDisplay"
     style="font-weight:bold; color:#003366; margin-bottom:15px;">
     Current Status: -
  </p>

  <!-- Manual Workflow Dropdown -->
  <label><b>Select Workflow Status (Manual Override)</b></label>
  <select id="statusSelect" style="width:100%;padding:8px;margin-bottom:10px;">
    <option value="">Select Workflow Status</option>
  </select>

  <textarea id="observationBox"
    placeholder="Observation (if any)"
    style="width:100%;padding:8px;margin-bottom:10px;"></textarea>

  <textarea id="recommendationBox"
    placeholder="Recommendation (if any)"
    style="width:100%;padding:8px;margin-bottom:10px;"></textarea>

  <div style="display:flex; gap:10px;">
    <button onclick="moveNextStep()" style="flex:1;">
      Move to Next Step
    </button>

    <button onclick="updateManually()" style="flex:1;">
      Update Manually
    </button>
  </div>

</div>

<!-- ALERT SECTION -->
<div class="alert-section">
  <h3>Latest Alerts</h3>
  <div id="alertBox">No alerts</div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/dashboard.js"></script>

<script>
  // 🔐 Secure Dashboard
  async function checkUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = "login.html";
    }
  }
  checkUser();

  // 👤 Show Logged User
  async function showUser() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      document.getElementById("userEmail").innerText = user.email;
    }
  }
  showUser();

  // 🚪 Logout
  async function logout() {
    await supabase.auth.signOut();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
