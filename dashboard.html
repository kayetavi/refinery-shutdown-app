<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinery Shutdown Control Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="main-header">
  <div class="header-left">
    🛢 <span>Refinery Shutdown Control Panel</span>
  </div>

  <div class="header-right">
    <span id="userEmail" class="user-badge"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<!-- ================= DASHBOARD CARDS ================= -->
<section class="dashboard-container">

  <div class="status-card maintenance">
    <h3>Maintenance Started</h3>
    <p id="maintenanceCount">0</p>
  </div>

  <div class="status-card preclean">
    <h3>Pre-Cleaning Inspection</h3>
    <p id="preCleanCount">0</p>
  </div>

  <div class="status-card postclean">
    <h3>Post-Cleaning Inspection</h3>
    <p id="postCleanCount">0</p>
  </div>

  <div class="status-card boxup">
    <h3>Ready for Box-Up</h3>
    <p id="boxupCount">0</p>
  </div>

</section>

<!-- ================= MAIN GRID ================= -->
<section class="main-grid">

  <!-- WORKFLOW PANEL -->
  <div class="panel workflow-panel">
    <h3>🔄 Equipment Workflow Update</h3>

    <label>Select Equipment</label>
    <select id="equipmentSelect">
      <option value="">Loading equipment...</option>
    </select>

    <label>Current Status</label>
    <div class="status-display">
      <span id="currentStatusDisplay">No Equipment Selected</span>
    </div>

    <label>Manual Override Status</label>
    <select id="statusSelect">
      <option value="">Select Workflow Status</option>
      <option>Maintenance Started</option>
      <option>Pre-Cleaning Inspection</option>
      <option>Post-Cleaning Inspection</option>
      <option>Ready for Box-Up</option>
    </select>

    <textarea id="observationBox" placeholder="Observation (if any)"></textarea>
    <textarea id="recommendationBox" placeholder="Recommendation (if any)"></textarea>

    <div class="button-row">
      <button class="primary-btn" onclick="moveNextStep()">Move to Next Step</button>
      <button class="secondary-btn" onclick="updateManually()">Update Manually</button>
    </div>

  </div>

  <!-- ALERT PANEL -->
  <div class="panel alert-panel">
    <h3>⚠ Live Alerts</h3>
    <div id="alertBox" class="alert-box">
      No alerts available
    </div>
  </div>

</section>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/dashboard.js"></script>

<script>
  async function checkUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) window.location.href = "login.html";
  }
  checkUser();

  async function showUser() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) document.getElementById("userEmail").innerText = "👤 " + user.email;
  }
  showUser();

  async function logout() {
    await supabase.auth.signOut();
    window.location.href = "login.html";
  }
</script>

</body>
</html>
