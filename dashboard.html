<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Refinery Shutdown Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* TOP NAV */

.top-nav{
background:#1f3c88;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
}

.top-nav nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

/* KPI CARDS */

.metrics{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
padding:20px;
}

.card{
background:white;
border-radius:8px;
padding:15px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h2{
margin:5px 0;
}

.orange{border-left:6px solid #ff7f0e;}
.blue{border-left:6px solid #1f77b4;}
.red{border-left:6px solid #d62728;}
.yellow{border-left:6px solid #f1c40f;}
.green{border-left:6px solid #2ecc71;}
.purple{border-left:6px solid #9b59b6;}

/* MAIN GRID */

.main-layout{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
padding:20px;
}

/* ALERT PANEL */

.alerts-panel{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.alert-item{
background:#fff3cd;
padding:8px;
margin:5px 0;
border-radius:4px;
}

/* CONTENT */

.content-panel{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* PROGRESS */

.progress-bar{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
background:#1f77b4;
height:100%;
text-align:center;
color:white;
font-size:12px;
}

/* TABLE */

.status-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.status-table th{
background:#f2f2f2;
padding:10px;
}

.status-table td{
padding:10px;
border-bottom:1px solid #ddd;
}

.status-table tr:hover{
background:#f9f9f9;
}

</style>

</head>

<body>

<header class="top-nav">

<div>🛢 Refinery Shutdown Dashboard</div>

<nav>

<a href="dashboard.html">Home</a>
<a href="units.html">Units</a>
<a href="equipment.html">Equipment</a>
<a href="reports.html">Reports</a>

</nav>

<button onclick="logout()">Logout</button>

</header>


<!-- KPI CARDS -->

<section class="metrics">

<div class="card orange" onclick="goToUnits()">
Total Units
<h2 id="totalUnits">0</h2>
</div>

<div class="card blue" onclick="goToEquipment()">
Total Equipment
<h2 id="totalEquipment">0</h2>
</div>

<div class="card red" onclick="goToEquipment()">
Shutdown Equipment
<h2 id="shutdownCount">0</h2>
</div>

<div class="card yellow" onclick="filterStatus('Offered for Pre-Cleaning Inspection')">
Pre-Cleaning Pending
<h2 id="preCleanCount">0</h2>
</div>

<div class="card green" onclick="filterStatus('Offered for Post-Cleaning Inspection')">
Post-Cleaning Offered
<h2 id="postCleanCount">0</h2>
</div>

<div class="card purple" onclick="filterStatus('NDT Inspection')">
NDT Pending
<h2 id="ndtPending">0</h2>
</div>

</section>


<!-- MAIN -->

<section class="main-layout">

<aside class="alerts-panel">

<h3>Alerts & Notifications</h3>

<div id="alertsContainer"></div>

</aside>


<div class="content-panel">

<h3>Equipment Shutdown Overview</h3>

<label>Shutdown Progress</label>

<div class="progress-bar">

<div id="progressFill" class="progress-fill">0%</div>

</div>

<table class="status-table">

<thead>

<tr>
<th>Tag No</th>
<th>Status</th>
<th>Waiting Time</th>
<th>Operation Status</th>
</tr>

</thead>

<tbody id="cduTableBody">

<tr>
<td colspan="4">Loading...</td>
</tr>

</tbody>

</table>

</div>

</section>

<script src="js/dashboard.js"></script>

</body>

</html>
